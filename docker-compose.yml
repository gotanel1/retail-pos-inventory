name: retail-pos-inventory

services:
  db:
    image: postgres:18.4-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-retail_pos}
      POSTGRES_USER: ${POSTGRES_USER:-retail}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-retail_local_password}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 12
    restart: unless-stopped

  app:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/${POSTGRES_DB:-retail_pos}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-retail}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-retail_local_password}
      SESSION_COOKIE_SECURE: ${SESSION_COOKIE_SECURE:-false}
      APP_BOOTSTRAP_OWNER_USERNAME: ${APP_BOOTSTRAP_OWNER_USERNAME:-owner}
      APP_BOOTSTRAP_OWNER_PASSWORD: ${APP_BOOTSTRAP_OWNER_PASSWORD:-}
      APP_BOOTSTRAP_OWNER_DISPLAY_NAME: ${APP_BOOTSTRAP_OWNER_DISPLAY_NAME:-เจ้าของร้าน}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      APP_DEMO_DATA: ${APP_DEMO_DATA:-false}
      APP_DEMO_PASSWORD: ${APP_DEMO_PASSWORD:-}
      BUSINESS_ZONE: ${BUSINESS_ZONE:-Asia/Bangkok}
      SPRINGDOC_ENABLED: ${SPRINGDOC_ENABLED:-true}
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-}
      APP_PAYMENT_FAKE: ${APP_PAYMENT_FAKE:-false}
    ports:
      - "${APP_PORT:-8080}:8080"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
