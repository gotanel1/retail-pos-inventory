spring.application.name=retail-pos-inventory
server.port=${PORT:8080}

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/retail_pos}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:retail}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:retail_local_password}
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.mvc.problemdetails.enabled=true

spring.flyway.enabled=true

server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.same-site=lax
server.servlet.session.cookie.secure=${SESSION_COOKIE_SECURE:false}

management.endpoints.web.exposure.include=health,info
management.endpoint.health.probes.enabled=true
management.info.env.enabled=true
info.app.name=Retail POS & Inventory
info.app.description=Single-store retail POS and inventory portfolio application

springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui

app.bootstrap.owner.username=${APP_BOOTSTRAP_OWNER_USERNAME:owner}
app.bootstrap.owner.password=${APP_BOOTSTRAP_OWNER_PASSWORD:}
app.bootstrap.owner.display-name=${APP_BOOTSTRAP_OWNER_DISPLAY_NAME:เจ้าของร้าน}
